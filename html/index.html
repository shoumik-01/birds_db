<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bird Search</title>
    <style>
        body {
            font-family: 'Georgia Pro', serif;
            font-size: 16px;
        }

        .form-inline {
            display: flex;
            align-items: center;
        }

        .form-inline label {
            margin-right: 10px;
        }

        .form-inline input {
            margin-right: 10px;
        }

        .form-inline button {
            margin-right: 10px;
        }

        .or-separator {
            margin-right: 10px;
            margin-left: 10px;
        }

        .suggestions a {
            display: inline-block;
            margin-right: 8px;
            color: #1a73e8;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Bird Search</h1>
    <div class="form-inline">
        <form id="birdForm" class="form-inline">
            <label for="birdName">Enter bird name:</label>
            <input type="text" id="birdName" name="birdName" maxlength="100" required>
            <button type="submit">Search</button>
        </form>
        <span class="or-separator">OR</span>
        <button id="randomBirdButton">Pick a random bird</button>
    </div>
    <div id="result"></div>

    <script>
        const form = document.getElementById('birdForm');
        const resultDiv = document.getElementById('result');
        const randomBirdButton = document.getElementById('randomBirdButton');

        function renderBird(data) {
            resultDiv.innerHTML = `
                <p style="font-weight: bold;">Common Name: ${data.common_name}</p>
                <p style="font-weight: bold;">Scientific Name: ${data.scientific_name}</p>
                <p style="font-weight: bold;">Avg. Weight: ${data.weight}</p>
                <p style="font-weight: bold;">Avg. Length: ${data.length}</p>
                <img src="${data.ID}.jpg" alt="Bird Image" style="max-width: 100%;">
            `;
        }

        function renderSuggestions(birds) {
            const links = birds.map(bird => {
                return `<a href="#" data-id="${bird.ID}" class="suggestion-link">${bird.common_name}</a>`;
            }).join(', ');

            resultDiv.innerHTML = `<p>Did you mean: <span class="suggestions">${links}</span></p>`;

            // Attach click handlers to each suggestion
            resultDiv.querySelectorAll('.suggestion-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const chosenName = link.textContent;
                    fetchBird(chosenName);
                });
            });
        }

        async function fetchBird(birdName) {
            try {
                const response = await fetch(`backend.php?birdName=${encodeURIComponent(birdName)}`);
                const data = await response.json();

                if (Array.isArray(data)) {
                    if (data.length === 1) {
                        renderBird(data[0]);
                    } else {
                        renderSuggestions(data);
                    }
                } else {
                    resultDiv.textContent = 'Bird not found';
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        form.addEventListener('submit', (event) => {
            event.preventDefault();
            const birdName = document.getElementById('birdName').value;
            fetchBird(birdName);
        });

        randomBirdButton.addEventListener('click', async () => {
            try {
                const response = await fetch('backend.php?random=true');
                const data = await response.json();

                if (response.ok && !data.error) {
                    renderBird(data);
                } else {
                    resultDiv.textContent = 'Bird not found';
                }
            } catch (error) {
                console.error('Error:', error);
            }
        });
    </script>
</body>
</html>
